name: workcalender
description: A smart productivity and planning app combining calendar, task management, AI scheduling, and voice input.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.3
  bloc: ^8.1.3
  equatable: ^2.0.5

  # Navigation
  go_router: ^12.1.3

  # Local Database
  sqflite: ^2.3.2
  path: ^1.9.0
  path_provider: ^2.1.2

  # UI
  flutter_animate: ^4.3.0
  table_calendar: ^3.1.0
  fl_chart: ^0.66.2
  percent_indicator: ^4.2.3
  intl: ^0.18.1
  google_fonts: ^6.1.0
  shimmer: ^3.0.0

  # Local Storage
  shared_preferences: ^2.2.2

  # Voice / Speech
  speech_to_text: ^6.6.0

  # Notifications
  flutter_local_notifications: ^16.3.3
  timezone: ^0.9.4

  # Permissions
  permission_handler: ^11.1.0

  # Utils
  uuid: ^4.3.3
  collection: ^1.18.0
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
