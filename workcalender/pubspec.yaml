name: workcalender
description: A smart productivity and planning app combining calendar, task management, AI scheduling, and voice input.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.5
  bloc: ^8.1.4
  equatable: ^2.0.5

  # Navigation
  go_router: ^13.2.0

  # Local Database
  sqflite: ^2.3.3
  path: ^1.9.0
  path_provider: ^2.1.3

  # UI
  flutter_animate: ^4.5.0
  table_calendar: ^3.1.2
  fl_chart: ^0.68.0
  percent_indicator: ^4.2.3
  shimmer: ^3.0.0
  intl: ^0.19.0
  google_fonts: ^6.2.1

  # Local Storage (lightweight key-value)
  shared_preferences: ^2.2.3

  # Voice / Speech
  speech_to_text: ^6.6.2
  flutter_tts: ^4.0.2

  # Notifications
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4

  # Permissions
  permission_handler: ^11.3.1

  # Utils
  uuid: ^4.4.0
  logger: ^2.4.0
  collection: ^1.18.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
